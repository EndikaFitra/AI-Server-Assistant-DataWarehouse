# ==============================================
# Nginx Configuration — AIOps Target Web Server
# ==============================================

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format log kustom dengan informasi detail
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;

    # ── Upstream (opsional, untuk simulasi backend) ──
    # upstream backend {
    #     server app:3000;
    # }

    server {
        listen 80;
        server_name localhost;

        # ── Health Check Endpoint ──
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"aiops-nginx"}\n';
            add_header Content-Type application/json;
        }

        # ── Stub Status — dibutuhkan oleh nginx-exporter ──
        location /stub_status {
            stub_status;
            allow all;
        }

        # ── Simulasi endpoint yang bisa di-load test ──
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html>
<head><title>AIOps Target Server</title></head>
<body>
    <h1>AIOps Infrastructure Target</h1>
    <p>This server is monitored by Prometheus via nginx-exporter.</p>
    <p>Server Time: $time_local</p>
</body>
</html>';
        }

        # ── Simulasi endpoint lambat (untuk anomaly detection) ──
        location /slow {
            default_type application/json;
            return 200 '{"endpoint":"slow","delay":"simulated","status":"ok"}\n';
        }

        # ── Simulasi endpoint error (HTTP 500) ──
        location /error {
            return 500 '{"error":"Internal Server Error","simulated":true}\n';
            add_header Content-Type application/json;
        }

        # ── Simulasi endpoint heavy compute ──
        location /heavy {
            default_type application/json;
            return 200 '{"endpoint":"heavy","status":"processed"}\n';
        }
    }
}
